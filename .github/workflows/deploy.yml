name: Deploy (Zero/Minimal Downtime)

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to Server via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_IP }}
      username: root
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        set -e

        APP_DIR=/root/projects/infinite-machine
        REPO_URL=https://github.com/naseerai/infinite-machine.git

        echo "📁 Checking repository..."

        if [ ! -d "$APP_DIR/.git" ]; then
          echo "📥 Cloning repository..."
          git clone $REPO_URL $APP_DIR
        else
          echo "🔄 Pulling latest code..."
          cd $APP_DIR
          git reset --hard
          git pull origin main
        fi

        cd $APP_DIR

        echo "🧹 Cleaning old unused images..."
        docker image prune -f || true

        echo "🔨 Building & updating containers (no downtime)..."
        docker compose up -d --build --remove-orphans

        echo "🧼 Optional: remove old image of this app"
        docker rmi infinite-machine:latest || true

        echo "✅ Deployment completed successfully!"
```
